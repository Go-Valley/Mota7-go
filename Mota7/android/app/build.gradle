apply plugin: 'com.android.application'

android {
  signingConfigs {
    release {
      storeFile file('D:\\Mota7\\Apk\\keystore\\release.keystore')
      storePassword 'Mo@777'
      keyAlias 'mota7'
      keyPassword 'Mo@777'
    }
  }
  namespace = "com.mota7.app"
    compileSdk = rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.mota7.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        manifestPlaceholders = [GOOGLE_MAPS_API_KEY: (project.findProperty("GOOGLE_MAPS_API_KEY") ?: "")]
        // يجب أن يطابق App.getInfo().build في Capacitor — يُقارَن مع Remote Config: android_min_version_code
        // مواءمة iOS: نفس اسم الإصدار في ios/App/App.xcodeproj → MARKETING_VERSION ورقم البناء → CURRENT_PROJECT_VERSION، و package.json → "version".
        versionCode 28
        versionName "2.2"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        aaptOptions {
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
      signingConfig signingConfigs.release
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
    implementation "com.google.android.gms:play-services-maps:19.2.0"
}

apply from: 'capacitor.build.gradle'

def splashSource = file('../../src/assets/splash.png')
def logoSource = file('../../src/assets/start.png')
def splashTargetDir = file('src/main/res/drawable-nodpi')
def splashTarget = file("${splashTargetDir}/splash.png")
def logoTarget = file("${splashTargetDir}/start.png")

tasks.register('syncSplashFromAssets') {
    inputs.file(splashSource)
    inputs.file(logoSource)
    outputs.file(splashTarget)
    outputs.file(logoTarget)
    doLast {
        splashTargetDir.mkdirs()

        if (splashSource.exists()) {
            copy {
                from splashSource
                into splashTargetDir
                rename { 'splash.png' }
            }
            logger.lifecycle("[splash] Copied splash.png to android/app/src/main/res/drawable-nodpi/")
        } else {
            logger.lifecycle("[splash] src/assets/splash.png not found, keeping current Android splash resource.")
        }

        if (logoSource.exists()) {
            copy {
                from logoSource
                into splashTargetDir
                rename { 'start.png' }
            }
            logger.lifecycle("[splash] Copied start.png to android/app/src/main/res/drawable-nodpi/")
        } else {
            logger.lifecycle("[splash] src/assets/start.png not found, keeping current Android logo resource.")
        }
    }
}

def notificationSoundAds = file('../../src/assets/mota7.mp3')
def notificationSoundOrders = file('../../src/assets/talap.mp3')
def rawResDir = file('src/main/res/raw')

tasks.register('syncNotificationSoundFromAssets') {
    doLast {
        rawResDir.mkdirs()
        if (notificationSoundAds.exists()) {
            copy {
                from notificationSoundAds
                into rawResDir
                rename { 'mota7.mp3' }
            }
            logger.lifecycle("[notification-sound] Copied mota7.mp3 to android/app/src/main/res/raw/")
        } else {
            logger.lifecycle("[notification-sound] src/assets/mota7.mp3 not found, skipping.")
        }
        if (notificationSoundOrders.exists()) {
            copy {
                from notificationSoundOrders
                into rawResDir
                rename { 'talap.mp3' }
            }
            logger.lifecycle("[notification-sound] Copied talap.mp3 to android/app/src/main/res/raw/")
        } else {
            logger.lifecycle("[notification-sound] src/assets/talap.mp3 not found, skipping (طلبات العملاء).")
        }
    }
}

tasks.matching { it.name == 'preBuild' }.configureEach {
    dependsOn tasks.named('syncSplashFromAssets'), tasks.named('syncNotificationSoundFromAssets')
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.exists()) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch (ignored) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
