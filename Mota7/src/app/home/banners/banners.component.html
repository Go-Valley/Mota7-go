<div class="banners-wrapper" *ngIf="activeBanners$ | async as banners">
  <swiper-container 
    class="mota7-swiper"
    pagination="false" 
    autoplay-delay="4000"
    autoplay-disable-on-interaction="false"
    loop="false"
    rewind="true"
    slides-per-view="1"
    slides-per-group="1"
    observer="true" 
    observe-parents="true"
    threshold="20"
    touch-start-prevent-default="false"
    prevent-clicks="false"
    prevent-clicks-propagation="false"
    no-swiping="false"
    simulate-touch="true">
    
    <swiper-slide *ngFor="let banner of banners; let i = index; trackBy: trackByFn">
      <div class="banner-card" (click)="handleBannerClick(banner)" role="button" tabindex="0">
        <img [src]="banner.imageUrl" 
             alt="إعلان تطبيق متاح" 
             title="إعلان متاح"
             loading="eager"
             decoding="async">
        
        <div class="banner-overlay" *ngIf="banner.title">
          <h3>{{ banner.title }}</h3>
        </div>
      </div>
    </swiper-slide>

    <swiper-slide>
      <div class="banner-card ad-request-card" (click)="openAdRequest()" role="button" tabindex="0">
        <div class="glass-effect-layer"></div> 
        <div class="content">
          <div class="icon-badge">
            <img
              src="assets/mota7.png"
              class="mota7-logo-icon"
              alt="شعار متاح"
              title="مساحتك الإعلانية"
              width="76"
              height="76"
              decoding="async">
          </div>
          <h3>مساحتك الإعلانية هنا</h3>
          <p>أعلن معنا وابدأ بالوصول لآلاف العملاء</p>
          
          <ion-button fill="clear" class="start-now-btn" type="button">
            ابدأ الآن
          </ion-button>
        </div>
      </div>
    </swiper-slide>
    
  </swiper-container>
</div>

<!-- ════════════════════════════════════════════════════════
     Banner Ad Request — Premium Modal
     ════════════════════════════════════════════════════════ -->
<ion-modal
  [isOpen]="showBannerModal"
  (didDismiss)="closeBannerModal()"
  [initialBreakpoint]="0.65"
  [breakpoints]="[0, 0.65, 0.85]"
  [handle]="true"
  mode="ios"
  class="banner-request-modal"
>
  <ng-template>
    <ion-content class="banner-modal-content" dir="rtl">
      <div class="bm-body">
        <!-- Header area -->
        <div class="bm-hero">
          <div class="bm-logo-ring">
            <img src="assets/mota7.png" alt="مُتاح" width="52" height="52" />
          </div>
          <h2 class="bm-title">مساحتك الإعلانية على "مُتاح"</h2>
          <p class="bm-subtitle">اختر الخدمة المطلوبة لبدء إعلانك</p>
        </div>

        <!-- Option 1 — Display Banner -->
        <button type="button" class="bm-option bm-option--display" (click)="requestBannerDisplay()">
          <div class="bm-option__icon">
            <ion-icon name="megaphone-outline"></ion-icon>
          </div>
          <div class="bm-option__info">
            <span class="bm-option__label">📢 عرض بانر إعلاني على "مُتاح"</span>
            <span class="bm-option__price">{{ bannerDisplayPrice }} جم<span class="bm-option__unit"> / شهر</span></span>
          </div>
          <div class="bm-option__wa">
            <ion-icon name="logo-whatsapp"></ion-icon>
          </div>
        </button>

        <!-- Option 2 — Design Banner -->
        <button type="button" class="bm-option bm-option--design" (click)="requestBannerDesign()">
          <div class="bm-option__icon">
            <ion-icon name="color-palette-outline"></ion-icon>
          </div>
          <div class="bm-option__info">
            <span class="bm-option__label">🎨 تصميم بانر إعلاني</span>
            <span class="bm-option__price">{{ bannerDesignPrice }} جم<span class="bm-option__unit"> (مرة واحدة)</span></span>
          </div>
          <div class="bm-option__wa">
            <ion-icon name="logo-whatsapp"></ion-icon>
          </div>
        </button>

        <!-- Footer hint -->
        <div class="bm-footer">
          <ion-icon name="rocket-outline"></ion-icon>
          <span>وصولك لآلاف العملاء يبدأ من هنا</span>
        </div>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>
