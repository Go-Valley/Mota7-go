<div class="mota7-card-wrapper" *ngIf="ad" [class.is-unavailable]="!ad.is_available"
     [appAdImpressionTrack]="ad.id || ad.ad_id">
  <div class="title-and-badge-row">
    <div class="vehicle-title-header">
      {{ ad.details?.subject || 'مادة تعليمية' }}
    </div>
    <div class="modern-stage-badge">
      {{ getStageName(ad.category_id) }}
    </div>
  </div>

  <app-ad-card-engagement-row [ad]="ad" [showServiceRating]="true"></app-ad-card-engagement-row>

  <div class="main-info-row">
    <div class="avatar-wrapper">
      <div class="avatar-container">
        <div class="logo-circle">
          <ion-icon [name]="getCategoryIcon(ad.category_id)"></ion-icon>
        </div>
      
        <div class="verification-badge" 
        *ngIf="ad.is_verified && ad.is_verified !== 'none'" 
        [ngClass]="ad.verification_level">
     <img 
       loading="lazy" decoding="async"
       src="assets/gold.avif"
       *ngIf="ad.is_verified=== 'gold'"
       class="verify-img"
       alt="شارة التحقق الذهبية"
       title="متجر موثَّق - ذهبية">
     <img 
       loading="lazy" decoding="async"
       src="assets/blue.webp"
       *ngIf="ad.is_verified=== 'blue'"
       class="verify-img"
       alt="شارة التحقق الزرقاء"
       title="متجر موثَّق - زرقاء">
   </div>
 </div>

 </div>

    <div class="owner-details">
      <div class="owner-name-row">
        <span class="name-value">{{ ad.details?.teacher_name || 'ميدو' }}</span>
        
        <div class="icon-contact-actions" *ngIf="ad.is_available">
          <button class="icon-btn call" (click)="trackContactClick(ad, 'call'); contactAction('call', $event)" title="اتصال">
            <ion-icon name="call"></ion-icon>
          </button>
          <button class="icon-btn whatsapp" (click)="trackContactClick(ad, 'whatsapp'); contactAction('whatsapp', $event)" title="واتساب">
            <ion-icon name="logo-whatsapp"></ion-icon>
          </button>
        </div>
      </div>
    </div>
  </div>

  <div class="meta-grid-modern">
    <div class="grid-item city-box">
      <ion-icon name="location-outline"></ion-icon>
      <span>{{ ad.city || 'الخارجة' }}</span>
    </div>

    <div class="grid-item status-toggle" 
         [class.active]="ad.is_available"
         [class.inactive]="!ad.is_available">
      <ion-icon [name]="ad.is_available ? 'checkmark-done-circle' : 'close-circle'"></ion-icon>
      <span>{{ ad.is_available ? 'متاح الآن' : 'غير متاح' }}</span>
    </div>
  </div>
</div>
