<div
  class="store-icon-card store-icon-card--nav"
  *ngIf="ad"
  [appAdImpressionTrack]="ad.id || ad.ad_id"
  (click)="openStorePage($event)"
  role="button"
  tabindex="0"
  [attr.aria-label]="'فتح صفحة متجر ' + (ad.store_name || '')"
  (keydown.enter)="openStorePage($event)"
  (keydown.space)="$event.preventDefault(); openStorePage($event)"
>
  <div class="store-logo-row" dir="rtl">
    <button
      type="button"
      class="store-contact-btn store-contact-btn--call"
      *ngIf="hasStoreContact"
      (click)="contactAction('call', $event)"
      aria-label="اتصال هاتفي"
    >
      <ion-icon name="call" aria-hidden="true"></ion-icon>
    </button>

    <div class="store-logo-stack">
      <app-ad-card-engagement-row [ad]="ad" [showServiceRating]="false"></app-ad-card-engagement-row>

      <div class="store-circle">
        <div class="store-circle-frame">
          <img [src]="logoThumb"
               loading="lazy"
               decoding="async"
               (error)="$any($event.target).src = 'assets/mota7.png'"
               alt="لوجو المتجر">
        </div>

        <div
          class="verification-badge"
          *ngIf="ad.verification_level && ad.verification_level !== 'none'"
          [ngClass]="ad.verification_level"
        >
          <img
            loading="lazy"
            decoding="async"
            src="assets/gold.avif"
            *ngIf="ad.verification_level === 'gold'"
            class="verify-img"
            alt="شارة التحقق الذهبية"
            title="متجر موثَّق - ذهبية">
          <img
            loading="lazy"
            decoding="async"
            src="assets/blue.webp"
            *ngIf="ad.verification_level === 'blue'"
            class="verify-img"
            alt="شارة التحقق الزرقاء"
            title="متجر موثَّق - زرقاء">
        </div>
      </div>
    </div>

    <button
      type="button"
      class="store-contact-btn store-contact-btn--whatsapp"
      *ngIf="hasStoreContact"
      (click)="contactAction('whatsapp', $event)"
      aria-label="واتساب"
    >
      <ion-icon name="logo-whatsapp" aria-hidden="true"></ion-icon>
    </button>
  </div>

  <div class="store-heading" dir="rtl">
    <h2 class="store-name">{{ ad.store_name }}</h2>
    <button
      type="button"
      class="store-city-chip"
      *ngIf="hasCityForFilter"
      (click)="onCityChipClick($event)"
      [attr.aria-label]="'عرض المتاجر في ' + cityDisplay"
    >
      <ion-icon name="location-outline" aria-hidden="true"></ion-icon>
      <span>{{ cityDisplay }}</span>
    </button>
  </div>
</div>
