<div class="store-icon-card" *ngIf="ad" [appAdImpressionTrack]="ad.id || ad.ad_id">
  <div class="store-circle" (click)="toggleProducts($event)">
    <div class="store-circle-frame">
      <img [src]="storeLogoThumb()"
           loading="lazy"
           decoding="async"
           (error)="$any($event.target).src = 'assets/mota7.png'"
           alt="لوجو المتجر">
    </div>

    <div
      class="verification-badge"
      *ngIf="ad.verification_level && ad.verification_level !== 'none'"
      [ngClass]="ad.verification_level"
    >
      <img
        loading="lazy"
        decoding="async"
        src="assets/gold.avif"
        *ngIf="ad.verification_level === 'gold'"
        class="verify-img"
        alt="شارة التحقق الذهبية"
        title="متجر موثَّق - ذهبية">
      <img
        loading="lazy"
        decoding="async"
        src="assets/blue.webp"
        *ngIf="ad.verification_level === 'blue'"
        class="verify-img"
        alt="شارة التحقق الزرقاء"
        title="متجر موثَّق - زرقاء">
    </div>
  </div>

  <div class="store-name">{{ ad.store_name }}</div>

  <app-ad-card-engagement-row [ad]="ad" [showServiceRating]="false"></app-ad-card-engagement-row>

  <div class="products-panel" *ngIf="showProducts">
    <div class="store-products-loading" *ngIf="productsLoading">
      <ion-spinner name="crescent" aria-label="جاري التحميل"></ion-spinner>
    </div>
    <app-product-home-card *ngFor="let p of products" [ad]="p"></app-product-home-card>
    <p class="empty-store-products" *ngIf="!productsLoading && products.length === 0">
      لا توجد منتجات معروضة لهذا المتجر
    </p>
  </div>
</div>
