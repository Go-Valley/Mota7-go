<div
  class="mota7-card-wrapper home-premium-card home-premium--product"
  *ngIf="ad"
  [appAdImpressionTrack]="ad.id || ad.ad_id"
>
  <div class="home-premium-accent" aria-hidden="true"></div>
  <app-ad-card-engagement-row [ad]="ad" [showServiceRating]="false"></app-ad-card-engagement-row>
  <div class="clickable-content" (click)="openProductDetails()">
    <div class="product-description-header">
      {{ ad.details?.short_desc || ad.details?.title }}
    </div>

    <div class="main-info-row">
      <div class="image-wrapper">
        <img [src]="thumbSrc"
             loading="lazy" decoding="async"
             (error)="$any($event.target).src = 'assets/mota7.png'" 
             alt="صورة المنتج" 
             class="product-thumb">

            <div class="verification-badge-wrap">
              <app-verification-badge
                [tier]="ad.verification_level"
                [verified]="ad.is_verified"
                [validFrom]="ad.verification_valid_from"
                [validUntil]="ad.verification_valid_until"
              ></app-verification-badge>
            </div>
      </div>
  
      <div class="owner-details">
        <div class="name-and-title-section">
          <h2 class="product-main-title">{{ ad.details?.title }}</h2>
        </div>

        <div class="contact-buttons-row">
          <button class="action-btn call" (click)="trackContactClick(ad, 'call'); contactAction('call', $event)" aria-label="اتصال">
            <ion-icon name="call"></ion-icon>
          </button>
          <button *ngIf="ad.details?.whatsapp_phone || ad.owner_phone" class="action-btn whatsapp" (click)="trackContactClick(ad, 'whatsapp'); contactAction('whatsapp', $event)" aria-label="واتساب">
            <ion-icon name="logo-whatsapp"></ion-icon>
          </button>
        </div>
      </div>
    </div>

    <div class="owner-line-full">
      <span class="label">بواسطة:</span>
      <span class="name">{{ displayName }}</span>
    </div>

    <div class="meta-grid-modern">
      <div class="grid-item">
        <ion-icon name="location-outline"></ion-icon>
        <span>{{ sellerCityDisplay }}</span>
      </div>
      <div class="grid-item price-item">
        <ion-icon name="cash-outline"></ion-icon>
        <span>{{ ad.details?.price }} ج.م</span>
      </div>
      <div class="grid-item condition-item">
        <ion-icon name="shield-checkmark-outline"></ion-icon>
        <span>{{ ad.details?.condition || 'جديد' }}</span>
      </div>
    </div>

    <div
      class="product-add-cart-shell"
      role="presentation"
      (click)="$event.stopPropagation()"
    >
      <ion-button
        expand="block"
        size="small"
        class="btn-add-cart"
        [disabled]="addToCartDisabled"
        [title]="addToCartTooltip"
        (click)="addProductToCart($event)"
      >
        إضافة للعربة
      </ion-button>
    </div>
  </div>
</div>
