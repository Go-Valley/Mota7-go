<ion-tabs>
  <ion-tab-bar slot="bottom" class="mota7-tab-bar-four">

    <ion-tab-button tab="my-account" class="tab-side">
      <ion-icon name="person-outline"></ion-icon>
      <ion-label>حسابي</ion-label>
    </ion-tab-button>

    <ion-tab-button class="tab-add-ad" (click)="openAddAdvertisement()" aria-label="إضافة إعلان">
      <div class="tab-order-chip tab-add-ad-chip">
        <div class="tab-order-chip-icon tab-add-ad-chip-icon" aria-hidden="true">
          <ion-icon name="megaphone-outline"></ion-icon>
        </div>
        <span class="tab-order-caption">إضافة إعلان</span>
      </div>
    </ion-tab-button>

    <ion-tab-button class="tab-order" (click)="openServiceModal()" aria-label="طلب خدمة">
      <div class="tab-order-chip">
        <div class="tab-order-chip-icon" aria-hidden="true">
          <span class="fab-plus">+</span>
        </div>
        <span class="tab-order-caption">طلب خدمة</span>
      </div>
    </ion-tab-button>

    <ion-tab-button tab="home" class="tab-side" (click)="onHomeTabButtonClick()">
      <ion-icon name="home-outline"></ion-icon>
      <ion-label>الرئيسية</ion-label>
    </ion-tab-button>

  </ion-tab-bar>
</ion-tabs>

<ion-modal
  [isOpen]="isServiceModalOpen"
  [backdropDismiss]="true"
  [keepContentsMounted]="false"
  cssClass="service-request-modal"
  (didDismiss)="onModalDidDismiss()"
>
  <ng-template>
    <div class="service-modal-wrapper">
      <div class="service-modal-header">
        <div class="service-modal-title">طلب خدمة</div>
        <button
          type="button"
          class="service-modal-close"
          (click)="closeServiceModal($event)"
          aria-label="إغلاق"
        >
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>

      <div class="service-modal-body">
        <div class="service-modal-orbs" aria-label="إرشاد ومتابعة الطلبات">
          <button
            type="button"
            class="service-orb service-orb--how"
            (click)="openRequestServiceTutorial($event)"
            aria-label="إزاي تطلب خدمة — دليل خطوة بخطوة"
          >
            <span class="service-orb__halo" aria-hidden="true"></span>
            <span class="service-orb__shine" aria-hidden="true"></span>
            <span class="service-orb__icon-wrap" aria-hidden="true">
              <ion-icon name="book-outline"></ion-icon>
            </span>
            <span class="service-orb__label">إزاي تطلب<br />خدمة</span>
          </button>

          <button
            type="button"
            class="service-orb service-orb--orders"
            (click)="openMyOrdersModal($event)"
            aria-label="عرض طلباتي"
          >
            <span class="service-orb__halo" aria-hidden="true"></span>
            <span class="service-orb__shine" aria-hidden="true"></span>
            <span class="service-orb__icon-wrap" aria-hidden="true">
              <ion-icon name="list-outline"></ion-icon>
            </span>
            <span class="service-orb__label">عرض<br />طلباتي</span>
          </button>
        </div>

        <h2 class="service-modal-hero-question">محتاج تطلب ايه ؟</h2>

        <section class="service-quick-pick" aria-label="اختصارات طلب الخدمة">
          <div class="service-picker-grid">
            <button
              type="button"
              class="service-picker-tile"
              *ngFor="let tile of quickTransportTiles; trackBy: trackByQuickTileId"
              (click)="onQuickTransportPreset(tile.presetId)"
            >
              <div class="service-picker-img-ring">
                <img [src]="tile.img" [alt]="tile.label" loading="lazy" decoding="async" />
              </div>
              <span class="service-picker-label">{{ tile.label }}</span>
            </button>
            <button type="button" class="service-picker-tile service-picker-tile--more" (click)="onQuickTransportMore()">
              <div class="service-picker-more" aria-hidden="true">
                <span class="service-picker-more-plus">+</span>
              </div>
              <span class="service-picker-label">المزيد</span>
            </button>
          </div>
        </section>

        <div class="service-glow-divider" aria-hidden="true"></div>

        <section class="service-quick-pick" aria-label="خدمات الصيانة والحرف">
          <div class="service-picker-grid">
            <button
              type="button"
              class="service-picker-tile"
              *ngFor="let tile of quickOtherTiles; trackBy: trackByQuickTileId"
              (click)="onQuickOtherPreset(tile.presetId)"
            >
              <div class="service-picker-img-ring">
                <img [src]="tile.img" [alt]="tile.label" loading="lazy" decoding="async" />
              </div>
              <span class="service-picker-label">{{ tile.label }}</span>
            </button>
            <button type="button" class="service-picker-tile service-picker-tile--more" (click)="onQuickOtherMore()">
              <div class="service-picker-more" aria-hidden="true">
                <span class="service-picker-more-plus">+</span>
              </div>
              <span class="service-picker-label">المزيد</span>
            </button>
          </div>
        </section>

        <div class="service-glow-divider" aria-hidden="true"></div>

        <section class="service-quick-pick service-quick-pick--solo" aria-label="الخدمات التعليمية">
          <button type="button" class="service-picker-wide" (click)="onQuickEducationHub()">
            <div class="service-picker-img-ring service-picker-img-ring--wide">
              <img [src]="educationHubTileImg" alt="دروس خصوصية" loading="lazy" decoding="async" />
            </div>
            <span class="service-picker-label service-picker-label--wide">دروس خصوصية</span>
          </button>
        </section>
      </div>
    </div>
  </ng-template>
</ion-modal>

<ion-modal
  [isOpen]="isMyOrdersModalOpen"
  [backdropDismiss]="true"
  [keepContentsMounted]="false"
  cssClass="my-orders-sheet-modal"
  (didDismiss)="onMyOrdersModalDidDismiss()"
>
  <ng-template>
    <div class="my-orders-sheet">
      <div class="my-orders-sheet__header">
        <h2 class="my-orders-sheet__title">عرض طلباتي</h2>
        <button
          type="button"
          class="my-orders-sheet__close"
          (click)="closeMyOrdersModal($event)"
          aria-label="إغلاق"
        >
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>
      <div class="my-orders-sheet__body">
        <app-my-orders-panel *ngIf="isMyOrdersModalOpen" mode="sheet"></app-my-orders-panel>
      </div>
    </div>
  </ng-template>
</ion-modal>

<app-tutorial-modal
  [isOpen]="isAppTutorialOpen"
  (closed)="isAppTutorialOpen = false"
></app-tutorial-modal>

<app-tutorial-modal
  [isOpen]="isRequestTutorialOpen"
  mode="request"
  (closed)="isRequestTutorialOpen = false"
></app-tutorial-modal>
