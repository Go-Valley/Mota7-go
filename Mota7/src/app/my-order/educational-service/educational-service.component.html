<ion-header class="ion-no-border">
  <ion-toolbar mode="ios" class="mota7-dark-header">
    <ion-title class="header-title">تفاصيل الطلب التعليمي</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" class="close-btn-white">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="mota7-wrapper" dir="rtl">
    <div class="form-card-container">
      
      <div class="input-group">
        <label class="main-label">الأسم : <span>*</span></label>
        <ion-input
          #inputCustomerName
          type="text"
          [(ngModel)]="orderData.customerName"
          (ionInput)="onEducationNameInput($event)"
          placeholder="اكتب اسمك هنا">
        </ion-input>
      </div>

      <div class="input-group">
        <label class="main-label">رقم الهاتف : <span>*</span></label>
        <ion-input
          type="tel"
          maxlength="11"
          [(ngModel)]="orderData.customerPhone"
          (ionInput)="onCustomerPhoneInput($event)"
          (keydown)="onCustomerPhoneKeyDown($event)"
          (beforeinput)="onCustomerPhoneBeforeInput($event)"
          placeholder="01xxxxxxxxx">
        </ion-input>
        <p class="phone-live-warning" *ngIf="phoneLiveWarning" role="alert">{{ phoneLiveWarning }}</p>
      </div>

      <div class="input-group">
        <label class="main-label">المدينة : <span>*</span></label>
        <ion-select [(ngModel)]="orderData.city" 
                    interface="action-sheet" 
                    mode="ios" 
                    placeholder="اختر المدينة"
                    cancelText="إلغاء">
          <ion-select-option value="الخارجة">الخارجة</ion-select-option>
          <ion-select-option value="الداخلة">الداخلة</ion-select-option>
        </ion-select>
      </div>

      <div class="input-group">
        <label class="main-label">المرحلة التعليمية : <span>*</span></label>
        <ion-select [(ngModel)]="orderData.stage" 
                    (ionChange)="onStageChange()" 
                    interface="action-sheet" 
                    mode="ios"
                    placeholder="اختر المرحلة التعليمية"
                    cancelText="إلغاء">
          <ion-select-option *ngFor="let stage of educationItems" [value]="stage.nameAr">
            {{ stage.nameAr }}
          </ion-select-option>
        </ion-select>
      </div>

      <div class="input-group" *ngIf="orderData.stage">
        <label class="main-label">المادة التعليمية : <span>*</span></label>
        <ion-select [(ngModel)]="orderData.subject" 
                    interface="action-sheet" 
                    mode="ios"
                    placeholder="اختر المادة التعليمية"
                    cancelText="إلغاء">
          <ion-select-option *ngFor="let sub of availableSubjects" [value]="sub">
            {{ sub }}
          </ion-select-option>
        </ion-select>
      </div>

      <div class="input-group">
        <label class="main-label">ملاحظات إضافية :</label>
        <ion-textarea
          #textareaShortNote
          [(ngModel)]="orderData.shortNote"
          (ionInput)="onEducationShortNoteInput($event)"
          maxlength="50"
          placeholder="اكتب ملاحظاتك باختصار (مثلاً: طالب في الصف الثالث)"
          rows="3"
          class="mota7-textarea">
        </ion-textarea>
        <div class="char-counter">{{ (orderData.shortNote || '').length }}/50</div>
      </div>

      <div class="footer-action">
        <button class="mota7-orange-btn" (click)="submitOrder()">
          إرسال الطلب الآن
        </button>
      </div>

    </div>
  </div>
</ion-content>
