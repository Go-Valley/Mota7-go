<ion-header class="ion-no-border">
  <ion-toolbar mode="ios" class="mota7-dark-header">
    <ion-title class="header-title">تفاصيل الطلب</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="dismiss()" class="close-btn-white">
        <ion-icon name="close-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="mota7-wrapper" dir="rtl">
    <div class="form-card-container">
      
      <div class="input-group">
        <label class="main-label">الأسم : <span>*</span></label>
        <ion-input
          #inputCustomerName
          type="text"
          [ngModel]="orderData.customerName"
          (ionInput)="onOtherFreeTextInput($event, 'customerName')"
          placeholder="اكتب اسمك هنا">
        </ion-input>
      </div>

      <div class="input-group">
        <label class="main-label">رقم الهاتف : <span>*</span></label>
        <ion-input
          #inputCustomerPhone
          type="tel"
          maxlength="11"
          inputmode="numeric"
          autocomplete="tel-national"
          [ngModel]="orderData.customerPhone"
          (ngModelChange)="onCustomerPhoneChange($event)"
          (keydown)="onCustomerPhoneKeyDown($event)"
          placeholder="01xxxxxxxxx">
        </ion-input>
        <p class="phone-live-warning" *ngIf="phoneLiveWarning" role="alert">{{ phoneLiveWarning }}</p>
      </div>

      <div class="input-group">
        <label class="main-label">المدينة : <span>*</span></label>
        <ion-select [(ngModel)]="orderData.city" 
                    interface="action-sheet" 
                    mode="ios" 
                    placeholder="اختر المدينة"
                    cancelText="إلغاء">
          <ion-select-option value="الخارجة">الخارجة</ion-select-option>
          <ion-select-option value="الداخلة">الداخلة</ion-select-option>
        </ion-select>
      </div>

      <div class="input-group">
        <label class="main-label">الخدمة المطلوبة : <span>*</span></label>
        <ion-select [(ngModel)]="orderData.subService" 
                    interface="action-sheet" 
                    mode="ios" 
                    placeholder="اختر نوع الخدمة من القائمة"
                    cancelText="إلغاء">
          <ion-select-option *ngFor="let item of otherItems" [value]="item.nameAr">
            {{ item.nameAr }}
          </ion-select-option>
        </ion-select>
      </div>

      <div class="input-group">
        <label class="main-label">ملاحظات إضافية : <span>*</span></label>
        <ion-textarea
          #textareaShortNote
          [ngModel]="orderData.shortNote"
          (ionInput)="onOtherFreeTextInput($event, 'shortNote')"
          maxlength="50"
          placeholder="اشرح ما تحتاجه باختصار"
          rows="4"
          class="mota7-textarea">
        </ion-textarea>
        <div class="char-counter">{{ (orderData.shortNote || '').length }}/50</div>
      </div>

      <div class="footer-action">
        <button class="mota7-orange-btn" (click)="submitOrder()">
          إرسال الطلب
        </button>
      </div>

    </div>
  </div>
</ion-content>
