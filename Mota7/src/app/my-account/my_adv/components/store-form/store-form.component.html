<ion-header class="ion-no-border">
  <ion-toolbar mode="ios" class="mota7-header">
    <ion-title class="mota7-title">إعداد المتجر</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()" class="mota7-back-button">
        <ion-icon slot="icon-only" name="chevron-forward-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="store-container" dir="rtl">
    
    <div class="logo-section">
      <div class="logo-uploader" (click)="logoInput.click()">
        
        <div class="verification-badge-overlay">
          <app-verification-badge
            [tier]="storeBadgeTierRaw()"
            [verified]="storeBadgeVerifiedRaw()"
            [validFrom]="storeBadgeValidFrom"
            [validUntil]="storeBadgeValidUntil"
          ></app-verification-badge>
        </div>

        <div class="preview-img" *ngIf="storeData.logo">
          <img [src]="storeData.logo" alt="لوجو المتجر">
        </div>
        <div class="upload-placeholder" *ngIf="!storeData.logo">
          <ion-icon name="camera" class="orange-icon"></ion-icon>
          <p>إضافة شعار</p>
        </div>
        <input type="file" #logoInput (change)="onLogoUpload($event)" hidden accept="image/*">
      </div>
    </div>

    <div class="form-card">
      <div class="field-box">
        <ion-label class="bold-label">
          نوع النشاط التجاري <span class="required-star">*</span>
        </ion-label>
        <ion-item lines="none" class="input-item">
          <ion-select [(ngModel)]="storeData.category_id" 
                      placeholder="اختر تصنيف متجرك" 
                      interface="action-sheet" 
                      mode="ios"
                      class="center-select"
                      toggleIcon="chevron-down-outline">
            <ion-select-option *ngFor="let cat of storeCategories" [value]="cat.id">
              {{ cat.nameAr }}
            </ion-select-option>
          </ion-select>
        </ion-item>
      </div>

      <div class="field-box">
        <ion-label class="bold-label">
          اسم المتجر <span class="required-star">*</span>
        </ion-label>
        <ion-item lines="none" class="input-item">
          <ion-input #inputStoreName
                      [ngModel]="storeData.storeName"
                      (ionInput)="onStoreNameInput($event)"
                      placeholder="أدخل اسم متجرك" 
                      class="center-input"></ion-input>
        </ion-item>
      </div>

      <div class="field-box">
        <ion-label class="bold-label">
          رقم التواصل <span class="required-star">*</span>
        </ion-label>
        <ion-item lines="none" class="input-item disabled-look">
          <ion-icon name="call-outline" slot="start" class="field-icon"></ion-icon>
          <ion-input [(ngModel)]="storeData.contactPhone" readonly class="center-input"></ion-input>
        </ion-item>
      </div>
    </div>

    <div class="form-card">
      <ion-item lines="none" class="toggle-row">
        <ion-label>
          <h2 class="bold-text">تفعيل الواتساب</h2>
          <p class="hint-text">للتواصل المباشر مع العملاء</p>
        </ion-label>
        <ion-toggle [(ngModel)]="storeData.whatsappEnabled" 
                    [color]="storeData.whatsappEnabled ? 'success' : 'danger'"
                    class="mota7-toggle-status"></ion-toggle>
      </ion-item>

      <div class="field-box whatsapp-box" *ngIf="storeData.whatsappEnabled">
        <ion-item lines="none" class="input-item">
          <ion-icon name="logo-whatsapp" slot="start" color="success" class="field-icon"></ion-icon>
          <ion-input
            #inputWhatsappPhone
            mota7DigitsOnly="phone"
            [mota7DigitsOnlyOnWarn]="onWhatsappDigitsOnlyWarn"
            type="tel"
            maxlength="11"
            inputmode="numeric"
            pattern="[0-9]*"
            autocomplete="tel-national"
            placeholder="01xxxxxxxxx"
            class="center-input"
            [ngModel]="storeData.whatsappPhone"
            (ngModelChange)="onStoreWhatsappPhoneChange($event)"
            (keydown)="onStoreWhatsappPhoneKeyDown($event)"
            (beforeinput)="onStoreWhatsappPhoneBeforeInput($event)"
            (paste)="onStoreWhatsappPhonePaste($event)">
          </ion-input>
        </ion-item>
        <p class="phone-live-warning" *ngIf="whatsappPhoneLiveWarning" role="alert">{{ whatsappPhoneLiveWarning }}</p>
      </div>
    </div>

    <div class="form-card">
      <div class="field-box">
        <ion-label class="bold-label geo-field-label">مدينة المتجر*</ion-label>
        <p class="location-hint" *ngIf="isEditMode">اختر مدينة المتجر ضمن محافظتك</p>
        <app-governorate-city-selector
          variant="coverageMultiRestricted"
          fieldLabel="مدينة المتجر"
          [placeholder]="isEditMode ? 'اضغط لاختيار مدينة المتجر' : 'مدينتك المسجّلة عند إنشاء الحساب'"
          [displaySummary]="storeData.city"
          [seedCoverageCityIds]="coverageCityIdsForAd"
          [disabled]="!isEditMode"
          [maxCoverageCities]="1"
          [allowWholeGovernorate]="false"
          [restrictGovernorateIds]="userGovernorateId ? [userGovernorateId] : null"
          [maxScrollHeight]="'min(260px, 38vh)'"
          (coverageMultiChange)="onCoverageAreas($event)">
        </app-governorate-city-selector>
      </div>
    </div>

    <ion-button expand="block" class="submit-orange-btn" (click)="saveStore()">
      {{ isEditMode ? 'حفظ التعديلات' : 'إطلاق المتجر الآن' }}
    </ion-button>
  </div>
</ion-content>
