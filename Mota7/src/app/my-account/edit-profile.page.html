<ion-header class="ion-no-border">
  <ion-toolbar class="custom-header">
    <div class="header-content">
      <ion-buttons slot="start">
        <ion-button (click)="goBack()" class="back-btn-styled">
          <ion-icon name="chevron-forward-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
      
      <ion-title>تعديل الملف الشخصي</ion-title>
      
      <div class="spacer" slot="end"></div>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="edit-wrapper">
    <div class="profile-image-section">
      <div class="abstract-avatar-container">
        <div class="orbit-particle p1"></div>
        <div class="orbit-particle p2"></div>
        <div class="orbit-particle p3"></div>
        
        <div class="main-identity-core">
          <div class="identity-icon">
            <div class="head-blob"></div>
            <div class="body-arc"></div>
          </div>
        </div>
        
        <div class="pulse-rings">
          <div class="ring r1"></div>
          <div class="ring r2"></div>
        </div>
      </div>
    </div>

    <div class="form-container">
      <ion-label class="input-label">الاسم الكامل</ion-label>
      <ion-item lines="none" class="custom-input">
        <ion-icon name="person-outline" slot="start"></ion-icon>
        <ion-input
          #inputFullName
          [ngModel]="userData.fullName"
          (ionInput)="onFullNameInput($event)"
          (beforeinput)="onFullNameBeforeInput($event)"
          (compositionend)="onFullNameCompositionEnd()"
          maxlength="25"
          type="text"
          placeholder="اكتب اسمك"
        ></ion-input>
      </ion-item>

      <ion-label class="input-label">رقم الهاتف (لا يمكن تغييره)</ion-label>
      <ion-item lines="none" class="custom-input disabled">
        <ion-icon name="phone-portrait-outline" slot="start"></ion-icon>
        <ion-input [value]="userData.phone" readonly></ion-input>
      </ion-item>

      <ion-label class="input-label">المدينة</ion-label>
      <app-governorate-city-selector
        variant="signupSingle"
        fieldLabel="المدينة"
        placeholder="اضغط لاختيار المحافظة ثم المدينة"
        [displaySummary]="userData.city"
        [seedSingleSelection]="profileGeoSeed"
        [maxScrollHeight]="'min(320px, 50vh)'"
        (singleCityChange)="onProfileCityPick($event)">
      </app-governorate-city-selector>

      <ion-label class="input-label">البريد الإلكتروني</ion-label>
      <ion-item lines="none" class="custom-input">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input [(ngModel)]="userData.personalEmail" type="email" placeholder="بريدك الإلكتروني"></ion-input>
      </ion-item>

      <div class="change-pass-wrapper">
        <ion-button fill="clear" (click)="openChangePasswordModal()" class="change-password-btn" [disabled]="!acct.accountUsable()">
          <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
          تغيير كلمة المرور
        </ion-button>
      </div>

      <ion-button
        expand="block"
        class="save-btn"
        [disabled]="!acct.accountUsable()"
        (click)="saveProfile()"
      >
        <ion-icon name="save-outline" slot="end"></ion-icon>
        حفظ التعديلات
      </ion-button>
    </div>
  </div>
</ion-content>

<ion-modal
  [isOpen]="passwordModalOpen"
  [backdropDismiss]="true"
  mode="ios"
  cssClass="change-password-modal"
  (didDismiss)="onPasswordModalDismiss()"
>
  <ng-template>
    <ion-header class="ion-no-border">
      <ion-toolbar mode="ios">
        <ion-title>تغيير كلمة المرور</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="closePasswordModal()">إغلاق</ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>
    <ion-content class="ion-padding password-modal-content" scrollY="true">
      <div class="edit-wrapper">
        <div class="form-container">
          <p class="modal-hint" *ngIf="userData.phone">
            تحديث كلمة المرور لحساب
            <span class="ltr-email" dir="ltr">{{ userData.phone }}</span>
          </p>
          <ion-label class="input-label">كلمة المرور الحالية</ion-label>
          <ion-item lines="none" class="custom-input">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input [(ngModel)]="pwdCurrent" type="password" autocomplete="current-password" placeholder="أدخل كلمة المرور الحالية"></ion-input>
          </ion-item>
          <ion-label class="input-label">كلمة المرور الجديدة</ion-label>
          <ion-item lines="none" class="custom-input">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input [(ngModel)]="pwdNew" type="password" autocomplete="new-password" placeholder="كلمة المرور الجديدة"></ion-input>
          </ion-item>
          <ion-label class="input-label">تأكيد كلمة المرور الجديدة</ion-label>
          <ion-item lines="none" class="custom-input">
            <ion-icon name="lock-closed-outline" slot="start"></ion-icon>
            <ion-input [(ngModel)]="pwdConfirm" type="password" autocomplete="new-password" placeholder="أعد إدخال كلمة المرور الجديدة"></ion-input>
          </ion-item>
          <ion-button expand="block" class="save-btn" (click)="submitPasswordChange()">
            حفظ كلمة المرور الجديدة
          </ion-button>
        </div>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>
