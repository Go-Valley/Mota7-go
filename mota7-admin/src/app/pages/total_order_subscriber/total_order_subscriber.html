<app-mota7-header [title]="'إجمالي طلبات المشترك'" (backClick)="goBack()"></app-mota7-header>

<ion-content>
  <div class="subscriber-total-container" (click)="closeOpenSlidings($event)">
    
    <div class="search-section">
      <div class="search-bar-wrapper">
        <ion-icon name="search-outline" class="search-icon"></ion-icon>
        <input 
          type="text" 
          placeholder="ابحث باسم المشترك أو رقم هاتفه..." 
          [(ngModel)]="searchQuery"
          (input)="filterProviders()"
          class="search-input"
        >
      </div>
    </div>

    <div class="providers-grid">
      <ng-container *ngFor="let provider of filteredProviders">
        <ion-item-sliding #sliding>
          <ion-item lines="none" class="sliding-stat-item">
            <div class="provider-stat-card">
              <div class="provider-header">
                <div class="provider-info">
                  <h3>{{ provider.name }}</h3>
                  <p>{{ provider.phone }}</p>
                </div>
                <div class="provider-avatar">
                  <ion-icon name="person-circle-outline"></ion-icon>
                </div>
              </div>

              <div class="stats-row">
                <div class="stat-box pending">
                  <span class="count">{{ provider.pending }}</span>
                  <span class="label">معلق</span>
                </div>
                <div class="stat-box accepted">
                  <span class="count">{{ provider.accepted }}</span>
                  <span class="label">مقبول</span>
                </div>
                <div class="stat-box completed">
                  <span class="count">{{ provider.completed }}</span>
                  <span class="label">مكتمل</span>
                </div>
              </div>

              <div class="card-footer">
                <button type="button" class="whatsapp-btn" (click)="contactProvider(provider.phone)">
                  <ion-icon name="logo-whatsapp"></ion-icon>
                  تواصل مع المشترك
                </button>
              </div>
            </div>
          </ion-item>
          <ion-item-options side="end">
            <ion-item-option color="danger" (click)="confirmDeleteProviderOrders(provider, sliding); $event.stopPropagation()">
              <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
            </ion-item-option>
          </ion-item-options>
        </ion-item-sliding>
      </ng-container>
    </div>

    <div class="empty-state" *ngIf="filteredProviders.length === 0">
      <ion-icon name="person-circle-outline"></ion-icon>
      <p>لا يوجد مشتركون مطابقون للبحث</p>
    </div>

  </div>
</ion-content>
