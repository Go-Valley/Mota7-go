# مسح مهلة الطلبات + تناغم FCM دون Blaze (جدولة خارجية بحساب خدمة).
# أضِف Secret اسمها FIREBASE_SERVICE_ACCOUNT_JSON بالكامل كنصّ JSON واحد لمفتاح حساب الخدمة.
name: Mota7 Spark sync (orders + FCM)

on:
  schedule:
    # GitHub لا يضمن تنفيذ كل دقيقة؛ ~5 دقائق أكثر واقعية لتوفير حصة الوظائف.
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: mota7-spark-sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  spark-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # أي require داخل firebase/functions/*.cjs يفعِّل بحثًا يصعد حتى جذر المستودع.
      # لا يعتمد ذلك على firebase/spark-runner/node_modules وحده عند وجود وحدة بدون تنصيب في functions/.
      - name: Install repo root deps (firebase-admin for shared functions loaders)
        run: npm install --omit=dev

      # تثبيت إضافي لضمان node_modules المحلي إن لزم (cloudinary، firebase-functions، إلخ).
      - name: Install firebase/functions deps
        working-directory: firebase/functions
        run: npm install --omit=dev

      - name: Install spark-runner deps
        working-directory: firebase/spark-runner
        run: npm install --omit=dev

      - name: Run Spark batch
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        working-directory: firebase/spark-runner
        run: node runOnce.cjs
