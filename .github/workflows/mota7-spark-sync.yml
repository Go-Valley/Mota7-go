# مسح مهلة الطلبات + تناغم FCM دون Blaze (جدولة خارجية بحساب خدمة).
# أضِف Secret اسمها FIREBASE_SERVICE_ACCOUNT_JSON بالكامل كنصّ JSON واحد لمفتاح حساب خدمة.
name: Mota7 Spark sync (orders + FCM)

on:
  schedule:
    # GitHub لا يضمن تنفيذ كل دقيقة؛ ~5 دقائق أكثر واقعية لتوفير حصة الوظائف.
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: mota7-spark-sync-${{ github.repository }}
  cancel-in-progress: false

jobs:
  spark-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install spark-runner deps
        working-directory: firebase/spark-runner
        run: npm install --omit=dev

      # أي require داخل firebase/functions/*.cjs يفعِّل البحث في firebase/functions/node_modules قبل الصعود؛
      # لا يكتشف تنصيب spark-runner تلقائياً؛ نربط اسم الحزمة بنسخة spark-runner لمشهد CI واحد.
      - name: Bridge firebase-admin for firebase/functions loaders
        run: |
          mkdir -p firebase/functions/node_modules
          ln -sfn "$(pwd)/firebase/spark-runner/node_modules/firebase-admin" \
            "$(pwd)/firebase/functions/node_modules/firebase-admin"

      - name: Run Spark batch
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        working-directory: firebase/spark-runner
        run: node runOnce.cjs
